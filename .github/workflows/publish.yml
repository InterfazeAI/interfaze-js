name: Publish

# Manually create a GitHub Release -> publishes `interfaze` to npm
# and `@interfaze/interfaze` to JSR.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  npm-publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Node 24 ships npm 11 (needed later if you switch to OIDC trusted publishing).
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - run: npm run build
      - name: Publish to npm
        # Repo is private, so provenance (--provenance) is omitted; add it once the
        # repo is public and you move to OIDC trusted publishing.
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  jsr-publish:
    name: Publish to JSR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC auth for JSR — no token needed.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
      - run: npm ci
      - name: Publish to JSR
        run: npx jsr publish --allow-slow-types
