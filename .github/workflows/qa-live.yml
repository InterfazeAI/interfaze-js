name: Live QA

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC

concurrency:
  group: live-qa
  cancel-in-progress: true

jobs:
  live-qa:
    name: live QA (multimodal + tasks + streaming)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run live QA
        env:
          INTERFAZE_API_KEY: ${{ secrets.INTERFAZE_API_KEY }}
        run: npm run qa:live
